<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TrenoTracker</title>
    <script>
      // GitHub Pages SPA fallback: redirect any deep path to index.html
      // preserving the original path in the query so the router can restore it.
      (function () {
        var l = window.location;
        var redirect = l.pathname + l.search + l.hash;
        sessionStorage.setItem('spa-redirect', redirect);
        l.replace(l.origin + '/');
      })();
    </script>
  </head>
  <body></body>
</html>
